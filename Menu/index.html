<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xanedan — Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Noto+Kufi+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --s1:#debf97; --s2:#d4b48a; --s3:#c9a87d;
  --border:rgba(0,0,0,0.12); --gold:#c9a84c; --gold2:#e8c97a;
  --w:#f0ece4; --m:rgba(240,236,228,0.72); --m2:rgba(240,236,228,0.52);
  --c-en:#c8860a; --c-ku:#ffffff; --c-ar:#ffffff;
  --c-price:#5c3d1e; --c-desc:rgba(255,255,255,0.75);
  --c-nav:#debf97; --c-nav-text:#1a0e04;
  --card-radius:14px; --card-img-w:100px; --card-min-h:96px; --card-gap:10px;
  --fs-en:17px; --fs-ku:13px; --fs-ar:12px; --fs-price:14px; --fs-desc:12px;
  --fen:'Cormorant Garamond',serif; --fku:'Noto Kufi Arabic',serif; --fd:'Cinzel',serif;
  --hero-title-color:#f0ece4;
  --hero-eye-color:#c9a84c;
  --hero-sub-color:rgba(240,236,228,0.72);
  --ls-name-color:#c9a84c;
  --ls-tag-color:rgba(240,236,228,0.6);
  --ls-btn-color:#c9a84c;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--w);font-family:var(--fen);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
#ls{position:fixed;inset:0;z-index:9999;background:#050505;display:flex;align-items:center;justify-content:center;}
.ls-bg{position:absolute;inset:0;overflow:hidden;}
.ls-box{position:relative;z-index:2;text-align:center;padding:40px 24px;animation:fUp .8s ease;}
.ls-name{font-family:var(--fd);font-size:clamp(44px,10vw,88px);font-weight:600;letter-spacing:.35em;color:var(--ls-name-color);text-shadow:0 0 80px rgba(201,168,76,.4);margin-bottom:8px;}
.ls-tag{font-style:italic;font-size:15px;letter-spacing:.4em;color:var(--ls-tag-color);margin-bottom:52px;}
.ls-rule{width:140px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 40px;}
.ls-hint{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,168,76,.55);margin-bottom:22px;}
.ls-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.ls-btn{border:1px solid var(--ls-btn-color);background:rgba(201,168,76,.06);color:var(--ls-btn-color);padding:18px 36px;cursor:pointer;transition:all .25s;min-width:120px;backdrop-filter:blur(10px);}
.ls-btn:hover{border-color:var(--gold);background:rgba(201,168,76,.12);color:var(--gold2);}
.ls-btn .bl{display:block;font-family:var(--fd);font-size:20px;letter-spacing:.08em;margin-bottom:5px;}
.ls-btn .bn{display:block;font-size:12px;opacity:.6;letter-spacing:.12em;}
#app{display:none;}
#app.on{display:block;animation:fIn .5s ease;}
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:58px;background:var(--c-nav);border-bottom:1px solid rgba(0,0,0,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 28px;}
.tb-logo{font-family:var(--fd);font-size:16px;letter-spacing:.3em;color:var(--c-nav-text);display:flex;align-items:center;gap:10px;}
.tb-lang{background:none;border:1px solid rgba(0,0,0,0.2);color:var(--c-nav-text);font-size:11px;letter-spacing:.18em;padding:6px 13px;cursor:pointer;transition:all .2s;}
.tb-lang:hover{border-color:var(--gold);}
.hero{height:100vh;position:relative;overflow:hidden;display:flex;align-items:flex-end;justify-content:flex-start;}
.hero-img{position:absolute;inset:0;overflow:hidden;background-color:#1a0e04;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,10,.92) 0%,rgba(10,10,10,.1) 45%,transparent 100%);}
.hero-cnt{position:relative;z-index:2;padding:0 52px 72px;max-width:680px;animation:fUp 1.2s .3s ease both;}
.h-eye{font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--hero-eye-color);opacity:.85;margin-bottom:16px;}
.h-title{font-family:var(--fd);font-size:clamp(50px,9vw,102px);font-weight:600;letter-spacing:.25em;line-height:.93;color:var(--hero-title-color,var(--gold));margin-bottom:20px;}
.h-title span{color:inherit;}
.h-sub{font-style:italic;font-size:clamp(14px,2vw,18px);color:var(--hero-sub-color);letter-spacing:.15em;margin-bottom:36px;}
.h-scroll{display:flex;align-items:center;gap:13px;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,168,76,.5);animation:bob 2s 2s ease-in-out infinite;}
.h-sline{width:52px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.nav-wrap{position:sticky;top:58px;z-index:90;background:var(--c-nav);border-bottom:1px solid rgba(0,0,0,0.12);overflow-x:auto;scrollbar-width:none;}
.nav-wrap::-webkit-scrollbar{display:none;}
.nav-tabs{display:flex;min-width:max-content;padding:0 16px;}
.tab{background:none;border:none;color:rgba(26,14,4,0.5);font-family:var(--fd);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;padding:10px 14px 8px;cursor:pointer;position:relative;transition:color .25s;white-space:nowrap;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.tab::after{content:'';position:absolute;bottom:0;left:14%;right:14%;height:2px;background:#8b5e00;transform:scaleX(0);transition:transform .25s;}
.tab:hover{color:#1a0e04;}
.tab.active{color:#8b5e00;}
.tab.active::after{transform:scaleX(1);}
.tab-img{width:72px;height:52px;border-radius:8px;object-fit:cover;object-position:center;border:2px solid rgba(0,0,0,0.12);transition:border-color .25s,transform .25s;filter:brightness(.88) saturate(1.05);}
.tab:hover .tab-img{border-color:#8b5e00;transform:scale(1.06);filter:brightness(1);}
.tab.active .tab-img{border-color:#8b5e00;border-width:2.5px;filter:brightness(1);}
.tab-no-img{width:72px;height:52px;border-radius:8px;background:var(--s3);border:2px solid rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.5;}
.content{max-width:1300px;margin:0 auto;padding:0 28px 100px;}
.section{display:none;padding-top:68px;}
.section.active{display:block;animation:fUp .4s ease;}
.sh{position:relative;height:320px;overflow:hidden;margin-bottom:40px;}
.sh img,.sh-fallback{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.sh img{filter:brightness(.5) saturate(.85);transition:transform 8s ease;}
.sh:hover img{transform:scale(1.03);}
.sh-fallback{background:linear-gradient(135deg,#2a1a06,#1a0e04);}
.sh-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,10,.1) 0%,rgba(10,10,10,.82) 100%);display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-end;gap:6px;padding:0 0 28px 36px;}
.sh-en{font-family:var(--fd);font-size:clamp(30px,5vw,54px);font-weight:600;letter-spacing:.2em;color:var(--w);}
.sh-ku{font-family:var(--fku);font-size:clamp(16px,2.2vw,24px);color:var(--gold);}
.sh-ar{font-family:var(--fku);font-size:clamp(14px,1.8vw,20px);color:var(--m);}
.sh-line{width:60px;height:1px;background:var(--gold);margin-top:4px;}
.card-list{display:flex;flex-direction:column;gap:var(--card-gap);}
.card{display:flex;align-items:stretch;background:var(--s1);position:relative;transition:background .2s;min-height:var(--card-min-h);border-radius:var(--card-radius);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.card:hover{background:var(--s2);}
.ci{width:var(--card-img-w);flex-shrink:0;overflow:hidden;border-radius:var(--card-radius) 0 0 var(--card-radius);}
.ci img{width:100%;height:100%;object-fit:cover;filter:brightness(.88) saturate(1.05);transition:transform .5s ease,filter .4s;display:block;}
.card:hover .ci img{transform:scale(1.06);filter:brightness(.98);}
.ci-empty{width:var(--card-img-w);flex-shrink:0;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:28px;opacity:.5;border-radius:var(--card-radius) 0 0 var(--card-radius);}
.cb{flex:1;padding:14px 20px 32px;display:flex;flex-direction:column;justify-content:flex-start;gap:5px;min-width:0;}
.cn-en{font-family:var(--fen);font-size:var(--fs-en);font-weight:700;color:var(--c-en);line-height:1.2;}
.cn-ku{font-family:var(--fku);font-size:var(--fs-ku);color:var(--c-ku);direction:rtl;line-height:1.4;opacity:.95;}
.cn-ar{font-family:var(--fku);font-size:var(--fs-ar);color:var(--c-ar);direction:rtl;line-height:1.4;opacity:.75;}
.cd-en{font-size:var(--fs-desc);color:var(--c-desc);font-style:italic;line-height:1.5;margin-top:4px;}
.cd-ku{font-family:var(--fku);font-size:11px;color:rgba(255,255,255,0.6);direction:rtl;line-height:1.4;}
.cd-ar{font-family:var(--fku);font-size:11px;color:rgba(255,255,255,0.5);direction:rtl;line-height:1.4;}
.cp{position:absolute;bottom:10px;left:calc(var(--card-img-w) + 20px);font-family:var(--fd);font-size:var(--fs-price);font-weight:600;color:var(--c-price);letter-spacing:.04em;white-space:nowrap;}
.tiers{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tier{font-size:11px;color:rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.25);padding:3px 9px;letter-spacing:.03em;white-space:nowrap;}
/* packages */
.pkg{position:relative;overflow:hidden;margin-bottom:16px;border:1px solid var(--border);transition:border-color .3s;}
.pkg:hover{border-color:rgba(201,168,76,.3);}
.pkg img{width:100%;height:280px;object-fit:cover;filter:brightness(.4) saturate(.8);display:block;}
.pkg-ov{position:absolute;inset:0;background:linear-gradient(105deg,rgba(10,10,10,.92) 48%,rgba(10,10,10,.2) 100%);display:flex;align-items:center;padding:44px 52px;}
.pkg-body{max-width:520px;}
.pkg-serves{font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:var(--gold);opacity:.65;margin-bottom:14px;}
.pkg-name-en{font-family:var(--fd);font-size:clamp(18px,2.5vw,28px);color:var(--w);margin-bottom:3px;}
.pkg-name-ku{font-family:var(--fku);font-size:clamp(13px,1.6vw,18px);color:var(--gold);direction:rtl;text-align:right;margin-bottom:2px;}
.pkg-name-ar{font-family:var(--fku);font-size:clamp(12px,1.4vw,16px);color:var(--m);direction:rtl;text-align:right;margin-bottom:16px;}
.pkg-price{font-family:var(--fd);font-size:36px;color:var(--gold);margin-bottom:14px;line-height:1;}
.pkg-price small{font-size:14px;opacity:.5;margin-left:3px;}
.pkg-inc-en{font-size:13px;color:var(--m);font-style:italic;line-height:1.85;}
.pkg-inc-ku{font-family:var(--fku);font-size:12px;color:rgba(240,236,228,.4);line-height:1.7;direction:rtl;text-align:right;margin-top:4px;}
.pkg-inc-ar{font-family:var(--fku);font-size:11px;color:rgba(240,236,228,.3);line-height:1.7;direction:rtl;text-align:right;margin-top:3px;}
/* ice cream */
.flavor-note{text-align:center;padding:16px;border:1px solid var(--border);background:var(--s1);margin-bottom:24px;}
.fn-main{font-family:var(--fd);font-size:12px;letter-spacing:.25em;color:var(--c-price);text-transform:uppercase;}
.fn-ku{font-family:var(--fku);font-size:13px;color:var(--c-ku);display:block;margin-top:4px;direction:rtl;opacity:.8;}
.fn-ar{font-family:var(--fku);font-size:12px;color:var(--c-ar);display:block;margin-top:3px;direction:rtl;opacity:.6;}
.flavor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);}
.fl{background:var(--s1);padding:14px 12px;text-align:center;transition:background .2s;}
.fl:hover{background:var(--s2);}
.fl-en{font-family:var(--fen);font-size:14px;color:var(--c-en);font-weight:600;}
.fl-ku{font-family:var(--fku);font-size:12px;color:var(--c-ku);margin-top:3px;direction:rtl;opacity:.85;}
.fl-ar{font-family:var(--fku);font-size:11px;color:var(--c-ar);margin-top:2px;direction:rtl;opacity:.65;}
/* loading */
.loading-msg{text-align:center;padding:60px;color:var(--m);}
.spinner{display:inline-block;width:28px;height:28px;border:2px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
footer{text-align:center;padding:52px 28px;border-top:1px solid rgba(0,0,0,0.1);font-style:italic;font-size:13px;color:var(--m);letter-spacing:.1em;line-height:2.2;}
@keyframes fIn{from{opacity:0}to{opacity:1}}
@keyframes fUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
@keyframes zoom{to{transform:scale(1);}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:#252525;border-radius:2px;}
@media(max-width:720px){
  .content{padding:0 12px 80px;}.topbar{padding:0 16px;}.hero-cnt{padding:0 20px 52px;}
  .ci,.ci-empty{width:80px !important;}.cp{left:calc(80px + 16px) !important;}
  .pkg-ov{padding:24px;background:linear-gradient(to top,rgba(10,10,10,.97) 50%,rgba(10,10,10,.5));}
}
</style>
</head>
<body>

<!-- LANG SCREEN -->
<div id="ls">
  <div class="ls-bg" id="ls-bg"><img id="ls-bg-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;"></div>

    <div class="ls-name" id="ls-name">XANEDAN</div>

<!-- APP -->
<div id="app">
  <header class="topbar">
    <div class="tb-logo" id="tb-logo">XANEDAN</div>

  <section class="hero">
    <div class="hero-img" id="hero-bg"><img id="hero-bg-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;object-position:center 30%;"></div>
    <div class="hero-ov"></div>
    <div class="hero-cnt">
      <div class="h-eye" id="h-eye">Akre · Kurdistan</div>
      <div class="h-title">XANE<span>DAN</span></div>
      <div class="h-sub" id="h-sub">Authentic · Beauty · Ancestry</div>
      <div class="h-scroll"><div class="h-sline"></div><span id="h-scroll">Explore Menu</span></div>
    </div>
  </section>
  <nav class="nav-wrap"><div class="nav-tabs" id="nav-tabs"><div class="loading-msg" style="padding:16px;"><div class="spinner"></div></div></div></nav>
  <div class="content" id="content"><div class="loading-msg"><div class="spinner"></div><div>Loading menu...</div></div></div>
  <footer>Xanedan Cafe &amp; Rest · خانەدان کافە و رەست · خانيدان كافيه<br>Akre · ئاکری · عقرة · Kurdistan</footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyCrJ1fDMI2Ni6-B5ICsX14XNEFVwUaTH-8",
  authDomain:"menu-5419d.firebaseapp.com",
  projectId:"menu-5419d",
  storageBucket:"menu-5419d.firebasestorage.app",
  messagingSenderId:"133756326207",
  appId:"1:133756326207:web:fa5cfa2e1e15889f7bc38a"
};
const db = getFirestore(initializeApp(FB));

let LANG = 'en', cats = [], items = [], cfg = {};

const HT = {
  en: { eye:'Akre · Kurdistan', sub:'Authentic · Beauty · Ancestry', scroll:'Explore Menu', lang:'EN ↩' },
  ku: { eye:'ئاکری · کوردستان', sub:'رەسەنایەتی · زووق · جوانی',   scroll:'مێنیویێ بکولیف', lang:'KU ↩' },
  ar: { eye:'عقرة · كردستان',   sub:'أصالة · جمال · عراقة',         scroll:'استكشف القائمة', lang:'AR ↩' },
};

// ── Helper: set image element ───────────────────────────────────────
function setImage(id, src, brightness, saturation) {
  if (!src) return;
  const el = document.getElementById(id);
  if (!el) return;
  el.src = src;
  el.style.display = 'block';
  el.style.filter = `brightness(${brightness / 100}) saturate(${saturation})`;
}

// ── Preload branding IMMEDIATELY (before user clicks anything) ──────
async function preloadBranding() {
  try {
    const snap = await getDoc(doc(db, 'settings', 'branding'));
    if (!snap.exists()) return;
    const d = snap.data();
    window._brandingData = d;
    const R = document.documentElement.style;

    if (d.name)    { const e = document.getElementById('ls-name'); if(e) e.textContent = d.name; document.title = d.name + ' — Menu'; }
    if (d.tagline) { const e = document.querySelector('.ls-tag');  if(e) e.textContent = d.tagline; }

    if (d.lsNameColor)    R.setProperty('--ls-name-color',    d.lsNameColor);
    if (d.lsTagColor)     R.setProperty('--ls-tag-color',     d.lsTagColor);
    if (d.lsBtnColor)     R.setProperty('--ls-btn-color',     d.lsBtnColor);
    if (d.pageBg)         R.setProperty('--bg',               d.pageBg);
    if (d.gold)           R.setProperty('--gold',             d.gold);
    if (d.heroTitleColor) R.setProperty('--hero-title-color', d.heroTitleColor);
    if (d.nameColor)      R.setProperty('--hero-title-color', d.nameColor);
    if (d.heroEyeColor)   R.setProperty('--hero-eye-color',   d.heroEyeColor);
    if (d.heroSubColor)   R.setProperty('--hero-sub-color',   d.heroSubColor);
    if (d.navBg)          R.setProperty('--c-nav',            d.navBg);
    if (d.navText)        R.setProperty('--c-nav-text',       d.navText);

    if (d.heroEyeText) { const e = document.getElementById('h-eye'); if(e) e.textContent = d.heroEyeText; }
    if (d.heroSubText) { const e = document.getElementById('h-sub'); if(e) e.textContent = d.heroSubText; }

    // Images
    if (d.lsBgUrl)   setImage('ls-bg-img',   d.lsBgUrl,   d.lsBgBr  || 38, 0.7);
    if (d.heroBgUrl) setImage('hero-bg-img', d.heroBgUrl, d.heroBgBr || 55, 0.9);

    // Logo
    if (d.logoUrl) {
      const tbl = document.getElementById('tb-logo');
      if (tbl) tbl.innerHTML = `<img src="${d.logoUrl}" style="width:28px;height:28px;border-radius:5px;object-fit:cover;margin-right:8px;">${tbl.textContent}`;
    }
  } catch(e) {
    console.warn('[Branding]', e.message);
  }
}
preloadBranding();

// ── Apply all Firebase settings to CSS vars ─────────────────────────
async function applyFirebaseSettings() {
  try {
    const [colSnap, typoSnap, layoutSnap, genSnap, clSnap, hlSnap] = await Promise.all([
      getDoc(doc(db,'settings','colors')),
      getDoc(doc(db,'settings','typography')),
      getDoc(doc(db,'settings','layout')),
      getDoc(doc(db,'settings','general')),
      getDoc(doc(db,'settings','cardLayout')),
      getDoc(doc(db,'settings','headerLayout')),
    ]);
    const R = document.documentElement.style;

    if (colSnap.exists()) {
      const d = colSnap.data();
      const map = {'c-card-bg':'--s1','c-card-hover':'--s2','c-en':'--c-en','c-ku':'--c-ku','c-ar':'--c-ar','c-desc':'--c-desc','c-price':'--c-price','c-bg':'--bg','c-gold':'--gold','c-nav':'--c-nav','c-nav-text':'--c-nav-text'};
      Object.entries(map).forEach(([k,v]) => { if(d[k]) R.setProperty(v, d[k]); });
    }
    if (typoSnap.exists()) {
      const d = typoSnap.data();
      if(d.fsEn)    R.setProperty('--fs-en',    d.fsEn+'px');
      if(d.fsKu)    R.setProperty('--fs-ku',    d.fsKu+'px');
      if(d.fsAr)    R.setProperty('--fs-ar',    d.fsAr+'px');
      if(d.fsPrice) R.setProperty('--fs-price', d.fsPrice+'px');
      if(d.fsDesc)  R.setProperty('--fs-desc',  d.fsDesc+'px');
    }
    if (layoutSnap.exists()) {
      const d = layoutSnap.data();
      if(d.radius)     R.setProperty('--card-radius', d.radius+'px');
      if(d.imgWidth)   R.setProperty('--card-img-w',  d.imgWidth+'px');
      if(d.cardHeight) R.setProperty('--card-min-h',  d.cardHeight+'px');
      if(d.cardGap)    R.setProperty('--card-gap',    d.cardGap+'px');
    }
    if (genSnap.exists()) {
      cfg = genSnap.data();
      if(cfg.nameEn) { document.getElementById('ls-name').textContent=cfg.nameEn; document.getElementById('tb-logo').textContent=cfg.nameEn; }
    }
    if (clSnap.exists()) {
      window._cardLayout = clSnap.data();
      const d = window._cardLayout;
      if(d.bg)     R.setProperty('--s1',         d.bg);
      if(d.radius) R.setProperty('--card-radius',d.radius+'px');
      if(d.height) R.setProperty('--card-min-h', d.height+'px');
      if(d.gap)    R.setProperty('--card-gap',   d.gap+'px');
      if(d.enC)    R.setProperty('--c-en',       d.enC);
      if(d.kuC)    R.setProperty('--c-ku',       d.kuC);
      if(d.arC)    R.setProperty('--c-ar',       d.arC);
      if(d.descC)  R.setProperty('--c-desc',     d.descC);
      if(d.priceC) R.setProperty('--c-price',    d.priceC);
      if(d.imgW)   R.setProperty('--card-img-w', d.imgW+'px');
    }
    if (hlSnap.exists()) window._headerLayout = hlSnap.data();
  } catch(e) {
    console.warn('[Settings]', e.message);
  }
}

// ── Boot (runs after language selected) ─────────────────────────────
async function boot() {
  try {
    await applyFirebaseSettings();
    const [cSnap, iSnap] = await Promise.all([
      getDocs(query(collection(db,'categories'), orderBy('order'))),
      getDocs(collection(db,'items')),
    ]);
    cats  = cSnap.docs.map(d => ({ id:d.id, ...d.data() }));
    items = iSnap.docs.map(d => ({ id:d.id, ...d.data() })).sort((a,b) => (a.order||0)-(b.order||0));
    buildNav();
    buildContent();
    // Fallback: use first item photo if no branding image set
    const bd = window._brandingData || {};
    const fp = items.find(i => i.photo)?.photo;
    if (fp) {
      if (!bd.lsBgUrl)   setImage('ls-bg-img',   fp, 38, 0.7);
      if (!bd.heroBgUrl) setImage('hero-bg-img', fp, 55, 0.9);
    }
  } catch(e) {
    document.getElementById('content').innerHTML = `<div style="padding:60px;text-align:center;color:#e74c3c;">Error loading menu: ${e.message}</div>`;
    console.error('[Boot]', e);
  }
}

// ── Build Navigation ────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav-tabs');
  if (!nav) return;
  nav.innerHTML = '';
  cats.forEach((cat, i) => {
    const catItems = items.filter(it => it.category === cat.id);
    const photo = catItems.find(it => it.photo)?.photo || '';
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.dataset.catId = cat.id;
    const imgHtml = photo
      ? `<img class="tab-img" src="${photo}" alt="${esc(cat.nameEn)}" onerror="this.outerHTML='<div class=tab-no-img>🍽️</div>'">`
      : `<div class="tab-no-img">🍽️</div>`;
    btn.innerHTML = imgHtml + `<span class="tab-label">${esc(getLang(cat,'name'))}</span>`;
    btn.onclick = () => showSection(cat.id, btn);
    nav.appendChild(btn);
  });
}

// ── Build Content Sections ──────────────────────────────────────────
function buildContent() {
  const content = document.getElementById('content');
  if (!content) return;
  content.innerHTML = '';
  cats.forEach((cat, i) => {
    const catItems = items.filter(it => it.category === cat.id);
    const sec = document.createElement('div');
    sec.className = 'section' + (i === 0 ? ' active' : '');
    sec.id = 's-' + cat.id;
    const heroPhoto = cat.imageUrl || catItems.find(it => it.photo)?.photo || '';
    const hl = window._headerLayout || {};
    function rgb(h) { h=h||'#000000'; return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`; }
    const op = hl.ovOp ? parseInt(hl.ovOp)/100 : 0.55;
    const r  = rgb(hl.ovC);
    const ovStyle = hl.ovStyle || 'top-fade';
    const ovBg = {
      'solid':       `rgba(${r},${op})`,
      'top-fade':    `linear-gradient(to bottom,rgba(${r},${op}),rgba(${r},${Math.max(0,op-.3)}))`,
      'bottom-fade': `linear-gradient(to top,rgba(${r},${op}),rgba(${r},${Math.max(0,op-.3)}))`,
      'left-fade':   `linear-gradient(to right,rgba(${r},${op}),rgba(${r},0))`,
      'vignette':    `radial-gradient(ellipse at center,rgba(${r},0) 30%,rgba(${r},${op}))`,
    }[ovStyle] || `rgba(${r},${op})`;
    const pad   = (hl.pad||28)+'px';
    const align = hl.align||'left';
    const posJ  = hl.posJ||'flex-end';
    const posA  = hl.posA||'flex-start';
    const imgH  = (hl.imgH||320)+'px';
    const imgBr = hl.imgBr||50;
    const imgSat= hl.imgSat||85;
    const imgBlur=hl.imgBlur||0;
    const imgPos= hl.imgPos||'center';
    sec.innerHTML = `<div class="sh" style="height:${imgH};">
      ${heroPhoto
        ? `<img src="${heroPhoto}" alt="${esc(cat.nameEn)}" style="width:100%;height:100%;object-fit:cover;object-position:${imgPos};filter:brightness(${imgBr}%) saturate(${imgSat}%) blur(${imgBlur}px);display:block;">`
        : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#2a1a06,#1a0e04);"></div>`}
      <div class="sh-ov" style="background:${ovBg};justify-content:${posJ};align-items:${posA};padding:${pad};text-align:${align};">
        ${hl.enShow!==false ? `<div class="sh-en" style="color:${hl.enC||'#fff'};font-size:${hl.enFs||54}px;letter-spacing:${hl.enLs||4}px;">${esc(cat.nameEn||'')}</div>` : ''}
        ${(hl.kuShow!==false && cat.nameKu) ? `<div class="sh-ku" style="color:${hl.kuC||'#c9a84c'};font-size:${hl.kuFs||24}px;">${esc(cat.nameKu)}</div>` : ''}
        ${(hl.arShow!==false && cat.nameAr) ? `<div class="sh-ar" style="color:${hl.arC||'rgba(240,236,228,.7)'};font-size:${hl.arFs||20}px;">${esc(cat.nameAr)}</div>` : ''}
        ${hl.lineShow!==false ? `<div style="width:${hl.lineW||60}px;height:${hl.lineH||2}px;background:${hl.lineC||'#c9a84c'};margin-top:4px;"></div>` : ''}
      </div>
    </div>`;
    if (!catItems.length) {
      sec.innerHTML += `<div style="padding:40px;text-align:center;font-style:italic;color:var(--m);">No items in this category yet.</div>`;
    } else {
      const list = document.createElement('div');
      list.className = 'card-list';
      catItems.forEach(item => list.appendChild(mkCard(item)));
      sec.appendChild(list);
    }
    content.appendChild(sec);
  });
  if (!cats.length) {
    content.innerHTML = `<div style="padding:80px;text-align:center;color:var(--m);font-style:italic;">No categories found. Add them in the admin panel.</div>`;
  }
}

// ── Build a single card ─────────────────────────────────────────────
function mkCard(item) {
  const cl = window._cardLayout || {};
  const card = document.createElement('div');
  card.className = 'card';
  if (item.colorBg || cl.bg) card.style.background = item.colorBg || cl.bg || '';

  const imgPos = cl.imgPos || 'left';
  const imgW   = cl.imgW   || 100;
  let photoHtml = '';
  if (imgPos !== 'none') {
    if (item.photo) {
      photoHtml = `<div class="ci" style="width:${imgW}px;order:${imgPos==='right'?2:0};"><img src="${item.photo}" alt="${esc(item.nameEn||'')}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.parentElement.outerHTML='<div class=ci-empty style=width:${imgW}px;>🍽️</div>'"></div>`;
    } else {
      photoHtml = `<div class="ci-empty" style="width:${imgW}px;order:${imgPos==='right'?2:0};">🍽️</div>`;
    }
  }

  const enStyle  = `color:${item.colorEn||cl.enC||'var(--c-en)'};font-size:${cl.enFs||17}px;font-weight:${cl.enFw||700};letter-spacing:${cl.enLs||0}px;text-align:${cl.enAlign||'left'};`;
  const nameEn   = (cl.enShow!==false && item.nameEn) ? `<div class="cn-en" style="${enStyle}">${esc(item.nameEn)}</div>` : '';
  const nameKu   = (cl.kuShow!==false && item.nameKu) ? `<div class="cn-ku" style="color:${cl.kuC||'var(--c-ku)'};font-size:${cl.kuFs||13}px;">${esc(item.nameKu)}</div>` : '';
  const nameAr   = (cl.arShow!==false && item.nameAr) ? `<div class="cn-ar" style="color:${cl.arC||'var(--c-ar)'};font-size:${cl.arFs||12}px;">${esc(item.nameAr)}</div>` : '';
  const descEn   = (cl.descShow!==false && item.descEn) ? `<div class="cd-en" style="color:${cl.descC||'var(--c-desc)'};font-size:${cl.descFs||12}px;">${esc(item.descEn)}</div>` : '';
  const descKu   = item.descKu ? `<div class="cd-ku">${esc(item.descKu)}</div>` : '';
  const descAr   = item.descAr ? `<div class="cd-ar">${esc(item.descAr)}</div>` : '';
  const tiers    = item.tiers?.length ? `<div class="tiers">${item.tiers.map(t=>`<span class="tier">${esc(t)}</span>`).join('')}</div>` : '';
  const priceStyle = `color:${item.colorPrice||cl.priceC||'var(--c-price)'};font-size:${cl.priceFs||14}px;font-weight:600;`;
  const price    = (cl.priceShow!==false && item.price) ? `<div class="cp" style="${priceStyle}">${Number(item.price).toLocaleString()} ${cfg.currency||'IQD'}</div>` : '';
  const padV     = cl.padV || 14;
  const padH     = cl.padH || 20;
  const bodyGap  = cl.lineGap || 5;

  card.innerHTML = `${photoHtml}<div class="cb" style="padding:${padV}px ${padH}px ${parseInt(padV)+18}px;gap:${bodyGap}px;">${nameEn}${nameKu}${nameAr}${descEn}${descKu}${descAr}${tiers}</div>${price}`;
  return card;
}

// ── Navigation ──────────────────────────────────────────────────────
window.showSection = function(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('s-' + id)?.classList.add('active');
  btn?.classList.add('active');
  document.querySelector('.nav-wrap')?.scrollIntoView({ behavior:'smooth', block:'nearest' });
};

// ── Language selection ──────────────────────────────────────────────
window.launch = function(lang) {
  LANG = lang;
  document.getElementById('ls').style.display = 'none';
  document.getElementById('app').classList.add('on');
  const h = HT[lang];
  document.getElementById('h-eye').textContent    = h.eye;
  document.getElementById('h-sub').textContent    = h.sub;
  document.getElementById('h-scroll').textContent = h.scroll;
  document.getElementById('tb-lang').textContent  = h.lang;
  document.documentElement.dir = (lang==='ku'||lang==='ar') ? 'rtl' : 'ltr';
  boot().then(() => {
    document.querySelectorAll('.tab').forEach(btn => {
      const cat = cats.find(c => c.id === btn.dataset.catId);
      if (!cat) return;
      const lbl = btn.querySelector('.tab-label');
      if (lbl) lbl.textContent = getLang(cat, 'name');
    });
  });
};

window.goBack = function() {
  document.getElementById('app').classList.remove('on');
  document.getElementById('ls').style.display = 'flex';
};

// ── Helpers ─────────────────────────────────────────────────────────
function getLang(obj, field) {
  if (LANG==='ku' && obj[field+'Ku']) return obj[field+'Ku'];
  if (LANG==='ar' && obj[field+'Ar']) return obj[field+'Ar'];
  return obj[field+'En'] || '';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
