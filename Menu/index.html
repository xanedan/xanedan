<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XANEDAN MENU</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Noto+Kufi+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
<style>

:root {
  --gold:#c9a84c;
  --ls-btn-border: var(--gold);
  --ls-btn-text:   var(--gold);
  --ls-btn-bg:     rgba(201,168,76,.06);
  --ls-btn-font:   'Oswald', sans-serif;
}

*  { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:#000; overflow-x:hidden; color:#fff; font-family:'Oswald',sans-serif; -webkit-font-smoothing:antialiased; }

/* ═══════════════════════════════════════════
   APP BACKGROUND  (behind everything)
═══════════════════════════════════════════ */
.app-bg {
  position:fixed; inset:0; z-index:-2;
  background:#000; overflow:hidden;
}
.app-bg img {
  width:100%; height:100%;
  object-fit:cover; object-position:center;
  display:none;
}

/* ═══════════════════════════════════════════
   COVER / WELCOME SCREEN
═══════════════════════════════════════════ */
#cover {
  position:fixed; inset:0; z-index:10000;
  overflow:hidden; background:#0a0a0a;
}
.cv-bg { position:absolute; inset:0; }
.cv-bg img { width:100%; height:100%; object-fit:cover; object-position:center 30%; }
.cv-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to bottom,
    rgba(5,5,5,.6) 0%, rgba(5,5,5,.1) 28%,
    rgba(5,5,5,.05) 52%, rgba(5,5,5,.78) 100%);
}
.cv-top {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center;
  padding-top:9vh; text-align:center;
}
.cv-logo-main {
  max-width:90%; max-height:var(--cv-logo-size, 22vh);
  width:auto; height:auto; object-fit:contain; display:none;
}
.cv-menu-btn {
  position:relative; z-index:2; display:block;
  margin:var(--cv-menu-gap, 7vh) auto 0;
  border:2px solid var(--cv-menu-border, #000);
  background:var(--cv-menu-bg, rgba(255,255,255,.85));
  backdrop-filter:blur(4px);
  color:var(--cv-menu-text, #000);
  font-family:var(--cv-menu-font, 'Oswald', sans-serif);
  font-size:22px; letter-spacing:.3em;
  padding:var(--cv-menu-pad-y, 16px) var(--cv-menu-pad-x, 62px);
  cursor:pointer; transition:all .25s;
}
.cv-menu-btn:hover { filter:brightness(1.12); }
.cv-links {
  position:relative; z-index:2;
  display:flex; justify-content:center;
  gap:60px; margin-top:9vh; flex-wrap:wrap;
}
.cv-link-group { display:flex; flex-direction:column; align-items:center; gap:10px; }
.cv-icons { display:flex; gap:10px; min-height:38px; }
.cv-icon {
  width:38px; height:38px; border-radius:50%;
  border:1.3px solid rgba(255,255,255,.8);
  display:flex; align-items:center; justify-content:center;
  color:#fff; text-decoration:none; transition:all .2s;
}
.cv-icon:hover { border-color:var(--gold); background:rgba(201,168,76,.15); }
.cv-label { font-size:10.5px; letter-spacing:.3em; text-transform:uppercase; color:rgba(255,255,255,.85); }
.cv-footer {
  position:absolute; left:0; right:0; bottom:0; z-index:2;
  display:flex; justify-content:space-between; align-items:flex-end;
  padding:0 32px 30px;
}
.cv-location, .cv-since { display:flex; flex-direction:column; gap:2px; }
.cv-since { text-align:right; align-items:flex-end; }
.cv-foot-label {
  font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.2em;
  color:rgba(255,255,255,.95); display:flex; align-items:center;
  gap:4px; text-transform:uppercase;
}
.cv-foot-text { font-size:11px; letter-spacing:.15em; color:rgba(255,255,255,.7); text-transform:uppercase; }
@media(max-width:480px) {
  .cv-menu-btn { padding:14px 44px; font-size:18px; }
  .cv-links { gap:34px; }
}

/* ═══════════════════════════════════════════
   LANGUAGE SELECTION SCREEN
═══════════════════════════════════════════ */
#ls {
  position:fixed; inset:0; z-index:9999;
  background:#050505; display:none;
  align-items:center; justify-content:center;
}
.ls-bg { position:absolute; inset:0; overflow:hidden; }
.ls-box {
  position:relative; z-index:2;
  text-align:center; padding:40px 24px;
  animation:fUp .8s ease;
}
.ls-logo-main {
  display:none; max-width:90%; max-height:var(--ls-logo-size, 24vh);
  width:auto; height:auto; object-fit:contain;
  margin:0 auto 16px;
}
.ls-name {
  font-family:'Oswald',sans-serif; font-size:clamp(44px,10vw,88px);
  font-weight:600; letter-spacing:.35em; color:var(--gold);
  text-shadow:0 0 80px rgba(201,168,76,.4); margin-bottom:8px;
}
.ls-rule {
  width:140px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:0 auto 40px;
}
.ls-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:48px; }
.ls-btn {
  border:1px solid var(--ls-btn-border); background:var(--ls-btn-bg);
  color:var(--ls-btn-text); padding:18px 36px; cursor:pointer;
  transition:all .25s; min-width:120px; backdrop-filter:blur(10px);
}
.ls-btn:hover { filter:brightness(1.15); }
.ls-btn .bl {
  display:block; font-family:var(--ls-btn-font);
  font-size:20px; letter-spacing:.08em; margin-bottom:5px;
}
.ls-btn .bn { display:block; font-size:12px; opacity:.6; letter-spacing:.12em; font-family:var(--ls-btn-font); }

/* ═══════════════════════════════════════════
   APP
═══════════════════════════════════════════ */
#app { display:none; }
#app.on { display:block; animation:fIn .5s ease; }

/* Semi-transparent overlay that sits on the bg image */
.app-tint {
  position:fixed; inset:0; z-index:-1;
  background:rgba(0,0,0,.38); pointer-events:none;
}

/* Header */
.app-header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:58px; background:transparent;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}
.app-logo { display:flex; align-items:center; gap:10px; }
.app-logo img {
  height:var(--app-logo-size, 36px); width:auto; object-fit:contain; display:none;
}
.app-logo-text {
  font-family:'Oswald',sans-serif; font-size:18px;
  letter-spacing:.3em; color:#f0ece4;
}
.app-lang-btn {
  background:var(--gold); border:none; border-radius:20px;
  color:#1a0e04; font-size:11px; font-weight:700;
  letter-spacing:.18em; padding:8px 18px; cursor:pointer;
  transition:all .2s; font-family:'Oswald',sans-serif;
}
.app-lang-btn:hover { filter:brightness(1.1); }

/* Content scroll area */
.app-scroll { padding-top:58px; min-height:100vh; }
.app-inner {
  max-width:1100px; margin:0 auto;
  padding:clamp(20px,4vw,40px) clamp(16px,4vw,40px) 80px;
}

/* ── CATEGORIES SLIDER ── */
.categories {
  display:flex;
  justify-content:center;
  justify-content:safe center;
  gap:clamp(10px,3vw,40px);
  margin-bottom:clamp(28px,5vw,50px);
  flex-wrap:nowrap;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
  scrollbar-width:none;
  cursor:grab;
}
.categories::-webkit-scrollbar { display:none; }
.categories.dragging { cursor:grabbing; scroll-snap-type:none; user-select:none; }

.category {
  text-align:center; cursor:pointer;
  transition:.3s; flex-shrink:0; scroll-snap-align:start;
}
.category-image {
  width:clamp(62px,15vw,140px);
  height:clamp(62px,15vw,140px);
  border:clamp(2px,.4vw,4px) solid #666;
  border-radius:clamp(12px,2.5vw,22px);
  overflow:hidden; transition:.3s;
  display:flex; align-items:center; justify-content:center;
  background:#111;
}
.category-image img { width:100%; height:100%; object-fit:cover; transition:.3s; }
.category h2 {
  margin-top:clamp(6px,1.5vw,15px);
  font-size:clamp(11px,2.3vw,22px);
  font-weight:500; color:#fff; transition:.3s;
}
.category:hover .category-image img { transform:scale(1.08); }
.category.active .category-image { border-color:#cc2222; box-shadow:0 0 20px rgba(204,34,34,.5); }
.category.active h2 { color:#cc2222; }

/* Arabic/Kurdish font for RTL text */
html[dir="rtl"] .category h2,
html[dir="rtl"] .food-info h3 span,
html[dir="rtl"] .food-info p {
  font-family:'Noto Kufi Arabic',sans-serif;
}

/* ── SUBCATEGORY HEADERS ── */
.subcat-header {
  display:flex; align-items:center; gap:14px;
  margin:clamp(20px,4vw,36px) 0 clamp(8px,2vw,14px);
}
.subcat-header:first-child { margin-top:4px; }
.subcat-title {
  font-family:'Oswald',sans-serif;
  font-size:clamp(12px,2.8vw,18px);
  font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--subcat-color, var(--gold)); white-space:nowrap;
}
.subcat-line {
  flex:1; height:1px;
  background:linear-gradient(to right, rgba(255,255,255,.35), rgba(255,255,255,.05));
  position:relative;
}
.subcat-line::after {
  content:''; position:absolute;
  right:0; top:50%; transform:translateY(-50%);
  width:6px; height:6px; border-radius:50%;
  background:rgba(255,255,255,.4);
}
html[dir="rtl"] .subcat-header { flex-direction:row-reverse; }
html[dir="rtl"] .subcat-line {
  background:linear-gradient(to left, rgba(255,255,255,.35), rgba(255,255,255,.05));
}
html[dir="rtl"] .subcat-line::after { right:auto; left:0; }

/* ── FOOD CARDS ── */
.foods { display:flex; flex-direction:column; gap:clamp(12px,2vw,22px); }

.food {
  display:flex; align-items:center;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(6px);
  border-radius:18px;
  padding:clamp(10px,2vw,18px);
  transition:.3s;
}
.food:hover { background:rgba(255,255,255,.1); }

.food-img {
  width:clamp(72px,22vw,170px);
  height:clamp(56px,16vw,120px);
  object-fit:cover; border-radius:15px; flex-shrink:0;
}
.food-img-placeholder {
  width:clamp(72px,22vw,170px);
  height:clamp(56px,16vw,120px);
  border-radius:15px; flex-shrink:0;
  background:#1a1a1a;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; opacity:.4;
}

.food-info { flex:1; min-width:0; padding-left:clamp(10px,2.5vw,25px); }
.food-info h3 {
  font-size:clamp(15px,4vw,32px);
  color:#d5c0a0; margin-bottom:6px;
  font-family:'Oswald',sans-serif;
}
.food-info h3 span { border-bottom:2px solid currentColor; padding-bottom:3px; }
.food-info p { color:#ccc; font-size:clamp(11px,1.8vw,18px); line-height:1.4; }

.food-price {
  min-width:clamp(50px,11vw,120px);
  flex-shrink:0; text-align:right;
  font-size:clamp(15px,3.6vw,36px);
  color:#d5c0a0; font-weight:bold;
  padding-left:8px;
}

/* RTL flip for food row when Arabic/Kurdish */
html[dir="rtl"] .food-info { padding-left:0; padding-right:clamp(10px,2.5vw,25px); }
html[dir="rtl"] .food-price { text-align:left; padding-left:0; padding-right:8px; }

/* Loading / empty states */
.state-msg {
  text-align:center; padding:60px 20px;
  color:rgba(255,255,255,.45); font-style:italic;
  font-size:clamp(13px,2vw,16px);
}

/* Scrollbar */
::-webkit-scrollbar { width:3px; height:3px; }
::-webkit-scrollbar-thumb { background:#444; border-radius:3px; }
::-webkit-scrollbar-track { background:transparent; }

/* Animations */
@keyframes fIn { from{opacity:0} to{opacity:1} }
@keyframes fUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

</style>
</head>
<body>

<!-- Fixed background image (behind everything) -->
<div class="app-bg">
  <img id="app-bg-img" src="" alt="">
</div>

<!-- ═══════════════ COVER SCREEN ═══════════════ -->
<div id="cover">
  <div class="cv-bg"><img id="cv-bg-img" src="" alt="" style="display:none;"></div>
  <div class="cv-overlay"></div>
  <div class="cv-top">
    <img class="cv-logo-main" id="cv-logo-main" src="" alt="">
  </div>
  <button class="cv-menu-btn" onclick="openLang()">MENU</button>
  <div class="cv-links">
    <div class="cv-link-group">
      <div class="cv-icons" id="cv-contact-icons"></div>
      <div class="cv-label">Contact</div>

      <div class="cv-icons" id="cv-social-icons"></div>
      <div class="cv-label">Social Media</div>

  </div>

    <div class="cv-location">
      <span class="cv-foot-label">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>
        <span id="cv-loc-label">Location</span>
      </span>
      <span class="cv-foot-text" id="cv-loc-text">Akre Kurdistan</span>
    </div>
    <div class="cv-since">
      <span class="cv-foot-label" id="cv-since-label">Here</span>
      <span class="cv-foot-text" id="cv-since-text">Since 2021</span>

  </div>
</div>

<!-- ═══════════════ LANGUAGE SCREEN ═══════════════ -->
<div id="ls">
  <div class="ls-bg">
    <img id="ls-bg-img" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;">
  </div>
  <div class="ls-box">
    <img class="ls-logo-main" id="ls-logo-main" src="" alt="">
    <div class="ls-name" id="ls-name">XANEDAN</div>

      <button class="ls-btn" onclick="launch('ar')"><span class="bl">AR</span><span class="bn">عربي</span></button>
    </div>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <div class="app-tint"></div>
  <header class="app-header">
    <div class="app-logo">
      <img id="app-logo-img" src="" alt="">
      <span class="app-logo-text" id="app-logo-text">XANEDAN</span>
    </div>
    <button class="app-lang-btn" onclick="goBack()" id="app-lang-btn">EN ↩</button>
  </header>
  <div class="app-scroll">
    <div class="app-inner">
      <section class="categories" id="categories">
        <div class="state-msg">Loading…</div>
      </section>
      <section class="foods" id="foods">
        <div class="state-msg">Loading…</div>
      </section>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, doc, getDocs, getDoc, query, orderBy }
                           from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyCrJ1fDMI2Ni6-B5ICsX14XNEFVwUaTH-8",
  authDomain:"menu-5419d.firebaseapp.com",
  projectId:"menu-5419d",
  storageBucket:"menu-5419d.firebasestorage.app",
  messagingSenderId:"133756326207",
  appId:"1:133756326207:web:fa5cfa2e1e15889f7bc38a"
};
const db = getFirestore(initializeApp(FB));

let LANG = 'en', cats = [], allItems = [], currency = 'IQD';

// ── Helpers ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getName(item) {
  if (LANG==='ku' && item.nameKu) return item.nameKu;
  if (LANG==='ar' && item.nameAr) return item.nameAr;
  return item.nameEn || item.name || '';
}
function getDesc(item) {
  if (LANG==='ku' && item.descKu) return item.descKu;
  if (LANG==='ar' && item.descAr) return item.descAr;
  return item.descEn || item.desc || '';
}
function getCatName(cat) {
  if (LANG==='ku' && cat.nameKu) return cat.nameKu;
  if (LANG==='ar' && cat.nameAr) return cat.nameAr;
  return cat.nameEn || cat.name || '';
}
function setImg(id, src, brightness) {
  if (!src) return;
  const el = document.getElementById(id);
  if (!el) return;
  el.src = src;
  el.style.display = 'block';
  if (brightness != null) el.style.filter = `brightness(${brightness/100})`;
}

// ── Preload branding (background, restaurant name) ──────────────────────
async function preloadBranding() {
  try {
    const snap = await getDoc(doc(db,'settings','branding'));
    if (!snap.exists()) return;
    const d = snap.data();
    window._brandingData = d;
    // App header logo
    if (d.logoUrl) {
      const ah = document.getElementById('app-logo-img');
      if (ah) { ah.src = d.logoUrl; ah.style.display = 'block'; }
      const at = document.getElementById('app-logo-text');
      if (at) at.style.display = 'none';
    }
    if (d.logoSize != null) document.documentElement.style.setProperty('--app-logo-size', d.logoSize + 'px');
    // Language screen logo
    if (d.lsLogoUrl) {
      const ls = document.getElementById('ls-logo-main');
      if (ls) { ls.src = d.lsLogoUrl; ls.style.display = 'block'; }
      const nm = document.getElementById('ls-name');
      if (nm) nm.style.display = 'none';
    }
    if (d.lsLogoSize != null) document.documentElement.style.setProperty('--ls-logo-size', d.lsLogoSize + 'vh');
    // App background image
    if (d.heroBgUrl) setImg('app-bg-img', d.heroBgUrl, d.heroBgBr||25);
    // Language screen background
    if (d.lsBgUrl)   setImg('ls-bg-img',  d.lsBgUrl,  d.lsBgBr||38);
    // Language screen name color
    if (d.lsNameColor) document.documentElement.style.setProperty('--gold', d.lsNameColor);
    // Subcategory header color
    if (d.subcatColor) document.documentElement.style.setProperty('--subcat-color', d.subcatColor);
    // Language button styling
    const R = document.documentElement.style;
    if (d.lsBtnColor)     R.setProperty('--ls-btn-border', d.lsBtnColor);
    if (d.lsBtnTextColor) R.setProperty('--ls-btn-text',   d.lsBtnTextColor);
    if (d.lsBtnBgColor != null && d.lsBtnBgOp != null) {
      const h = d.lsBtnBgColor.replace('#','');
      const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
      R.setProperty('--ls-btn-bg', `rgba(${r},${g},${b},${d.lsBtnBgOp/100})`);
    }
    if (d.lsBtnFont) {
      const lnk = document.createElement('link');
      lnk.rel = 'stylesheet';
      lnk.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(d.lsBtnFont)}:wght@400;600&display=swap`;
      document.head.appendChild(lnk);
      R.setProperty('--ls-btn-font', `'${d.lsBtnFont}', sans-serif`);
    }
  } catch(e) {
    console.warn('[Branding]', e.message);
  }
}

// ── Cover screen icons ──────────────────────────────────────────────────
const COVER_ICONS = {
  whatsapp:  '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.5 2.3.8 3.6.8.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3c.6 0 1 .4 1 1 0 1.3.3 2.5.8 3.6.1.3.1.7-.2 1L6.6 10.8z"/></svg>',
  instagram: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.3" cy="6.7" r="0.9" fill="currentColor" stroke="none"/></svg>',

function buildCoverIcons(containerId, items) {
  const c = document.getElementById(containerId);
  if (!c) return;
  c.innerHTML = '';
  (items||[]).forEach(it => {
    if (!it || !it.value) return;
    const href = it.type==='whatsapp'
      ? `https://wa.me/${String(it.value).replace(/[^0-9]/g,'')}`
      : it.value;
    const a = document.createElement('a');
    a.className = 'cv-icon';
    a.href = href; a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = COVER_ICONS[it.type] || COVER_ICONS.link;
    c.appendChild(a);
  });
}

// ── Preload cover screen data ───────────────────────────────────────────
async function preloadCover() {
  try {
    const snap = await getDoc(doc(db,'settings','cover'));
    const d = snap.exists() ? snap.data() : {};
    const bd = window._brandingData || {};
    // Cover background
    const bgUrl = d.bgUrl || bd.lsBgUrl || bd.heroBgUrl;
    if (bgUrl) setImg('cv-bg-img', bgUrl, d.bgUrl ? (d.bgBr||55) : 55);
    // Cover screen logo only
    if (d.logoUrl) {
      const cv = document.getElementById('cv-logo-main');
      if (cv) { cv.src = d.logoUrl; cv.style.display = 'block'; }
    }
    if (d.logoSize != null) document.documentElement.style.setProperty('--cv-logo-size', d.logoSize + 'vh');
    // Menu button styling
    const R = document.documentElement.style;
    if (d.menuBtnGap != null)  R.setProperty('--cv-menu-gap',   d.menuBtnGap + 'vh');
    if (d.menuBtnPadY != null) R.setProperty('--cv-menu-pad-y', d.menuBtnPadY + 'px');
    if (d.menuBtnPadX != null) R.setProperty('--cv-menu-pad-x', d.menuBtnPadX + 'px');
    if (d.menuBtnBorderColor) R.setProperty('--cv-menu-border', d.menuBtnBorderColor);
    if (d.menuBtnTextColor)   R.setProperty('--cv-menu-text',   d.menuBtnTextColor);
    if (d.menuBtnBgColor != null && d.menuBtnOpacity != null) {
      const h = d.menuBtnBgColor.replace('#','');
      const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
      R.setProperty('--cv-menu-bg', `rgba(${r},${g},${b},${d.menuBtnOpacity/100})`);
    } else if (d.menuBtnOpacity != null) {
      R.setProperty('--cv-menu-bg', `rgba(255,255,255,${d.menuBtnOpacity/100})`);
    }
    if (d.menuBtnFont) {
      const lnk = document.createElement('link');
      lnk.rel = 'stylesheet';
      lnk.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(d.menuBtnFont)}:wght@400;600&display=swap`;
      document.head.appendChild(lnk);
      R.setProperty('--cv-menu-font', `'${d.menuBtnFont}', sans-serif`);
    }
    // Footer text
    const setTxt = (id, val) => { if (!val) return; const e = document.getElementById(id); if (e) e.textContent = val; };
    setTxt('cv-loc-label', d.locLabel);
    setTxt('cv-loc-text',  d.locText);
    setTxt('cv-since-label', d.sinceLabel);
    setTxt('cv-since-text',  d.sinceText);
    // Contact + social icons
    const contacts = (d.contacts||[]).map(v => ({ type:'whatsapp', value:v }));
    const socials  = (d.socials||[]).map(s => typeof s==='string'
      ? { type:'link', value:s }
      : { type:s.type||'link', value:s.url });
    buildCoverIcons('cv-contact-icons', contacts);
    buildCoverIcons('cv-social-icons',  socials);
  } catch(e) {
    console.warn('[Cover]', e.message);
  }
}

// Run before user touches anything
(async () => { await preloadBranding(); preloadCover(); })();

// ── Screen navigation ───────────────────────────────────────────────────
window.openLang = function() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('ls').style.display    = 'flex';
};

window.launch = function(lang) {
  LANG = lang;
  document.getElementById('ls').style.display = 'none';
  document.getElementById('app').classList.add('on');
  document.documentElement.dir = (lang==='ku'||lang==='ar') ? 'rtl' : 'ltr';
  const labels = { en:'EN ↩', ku:'KU ↩', ar:'AR ↩' };
  document.getElementById('app-lang-btn').textContent = labels[lang] || 'EN ↩';
  boot();
};

window.goBack = function() {
  document.getElementById('app').classList.remove('on');
  document.getElementById('ls').style.display = 'flex';
};

// ── Load data from Firebase ─────────────────────────────────────────────
async function boot() {
  document.getElementById('categories').innerHTML = '<div class="state-msg">Loading…</div>';
  document.getElementById('foods').innerHTML      = '<div class="state-msg">Loading…</div>';
  try {
    const [cSnap, iSnap, genSnap] = await Promise.all([
      getDocs(query(collection(db,'categories'), orderBy('order'))),
      getDocs(collection(db,'items')),
      getDoc(doc(db,'settings','general')),
    ]);
    cats     = cSnap.docs.map(d => ({ id:d.id, ...d.data() }));
    allItems = iSnap.docs
      .map(d => ({ id:d.id, ...d.data() }))
      .sort((a,b) => (a.order||0) - (b.order||0));
    if (genSnap.exists() && genSnap.data().currency)
      currency = genSnap.data().currency;
    buildCategories();
    if (cats.length) showCategory(cats[0].id);
    else document.getElementById('foods').innerHTML = '<div class="state-msg">No categories found. Add them in the admin panel.</div>';
  } catch(e) {
    const msg = `<div class="state-msg" style="color:#e57373;">Error loading menu: ${esc(e.message)}</div>`;
    document.getElementById('categories').innerHTML = '';
    document.getElementById('foods').innerHTML = msg;
    console.error('[Boot]', e);
  }
}

// ── Build categories slider ─────────────────────────────────────────────
function buildCategories() {
  const el = document.getElementById('categories');
  if (!el) return;
  el.innerHTML = '';
  cats.forEach((cat, i) => {
    const imgSrc = cat.imageUrl || allItems.find(it => it.category===cat.id && it.photo)?.photo || '';
    const div = document.createElement('div');
    div.className = 'category' + (i===0 ? ' active' : '');
    div.dataset.catId = cat.id;
    const imgHtml = imgSrc
      ? `<img src="${esc(imgSrc)}" alt="${esc(getCatName(cat))}" onerror="this.style.display='none'">`
      : `<span style="font-size:28px;">🍽️</span>`;
    div.innerHTML = `<div class="category-image">${imgHtml}</div><h2>${esc(getCatName(cat))}</h2>`;
    div.addEventListener('click', () => {
      document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
      div.classList.add('active');
      showCategory(cat.id);
    });
    el.appendChild(div);
  });
  makeDragSlider(el);
}

// ── Show food items for selected category ───────────────────────────────
function showCategory(catId) {
  const items = allItems.filter(it => it.category === catId);
  const el = document.getElementById('foods');
  if (!el) return;
  if (!items.length) {
    el.innerHTML = '<div class="state-msg">No items in this category.</div>';
    return;
  }
  el.innerHTML = '';
  const isRtl = LANG==='ku' || LANG==='ar';

  // Group by EN subcategory key, display in current language
  const groups = [];
  const seen = {};
  items.forEach(item => {
    const key = (item.subcategoryEn || item.subcategory || '').trim();
    const display = (
      LANG === 'ar' ? (item.subcategoryAr || item.subcategoryKu || key) :
      LANG === 'ku' ? (item.subcategoryKu || key) : key
    ).trim();
    if (!seen[key]) { seen[key] = { display, list:[] }; groups.push(seen[key]); }
    seen[key].list.push(item);
  });

  let delay = 0;
  groups.forEach(({ display, list }) => {
    // Subcategory header (only when a name is set)
    if (display) {
      const hdr = document.createElement('div');
      hdr.className = 'subcat-header';
      hdr.innerHTML = `<span class="subcat-title">${esc(display)}</span><span class="subcat-line"></span>`;
      hdr.style.cssText = 'opacity:0;transition:.3s';
      el.appendChild(hdr);
      const _h = hdr;
      setTimeout(() => { _h.style.opacity='1'; }, delay);
      delay += 60;
    }

    list.forEach(item => {
      const div = document.createElement('div');
      div.className = 'food';
      const name  = esc(getName(item));
      const desc  = esc(getDesc(item));
      const price = item.price ? `${Number(item.price).toLocaleString()} ${currency}` : '';
      div.innerHTML = `
        ${item.photo
          ? `<img class="food-img" src="${esc(item.photo)}" alt="${name}" onerror="this.outerHTML='<div class=food-img-placeholder>🍽️</div>'">`
          : `<div class="food-img-placeholder">🍽️</div>`}
        <div class="food-info"${isRtl ? ' dir="rtl"' : ''}>
          <h3><span>${name}</span></h3>
          ${desc ? `<p>${desc}</p>` : ''}
        </div>
        ${price ? `<div class="food-price">${esc(price)}</div>` : ''}
      `;
      div.style.cssText = 'opacity:0;transform:translateY(16px);transition:.35s';
      el.appendChild(div);
      const _d = div;
      setTimeout(() => { _d.style.opacity='1'; _d.style.transform='none'; }, delay);
      delay += 40;
    });
  });
}

// ── Drag-to-scroll (desktop) ────────────────────────────────────────────
function makeDragSlider(track) {
  if (!track) return;
  let isDown=false, startX=0, startScroll=0, moved=false;
  track.addEventListener('mousedown', e => {
    isDown=true; moved=false;
    startX=e.pageX; startScroll=track.scrollLeft;
    track.classList.add('dragging');
  });
  window.addEventListener('mouseup', () => { isDown=false; track.classList.remove('dragging'); });
  track.addEventListener('mouseleave', () => { isDown=false; track.classList.remove('dragging'); });
  track.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const dx = e.pageX - startX;
    if (Math.abs(dx) > 4) moved = true;
    track.scrollLeft = startScroll - dx;
  });
  track.addEventListener('click', e => {
    if (moved) { e.preventDefault(); e.stopPropagation(); moved=false; }
  }, true);
}
